#!/bin/ansible-playbook

---

- hosts: localhost
  tasks:
    
  - name: Add Apt repositories
    tags: [ubuntu, apt_repository, proprietary]
    become: true
    block:
    - name: Add Example GPG key
      when: item.url is defined
      ansible.builtin.get_url:
        url: "{{ item.url }}"
        dest: "/etc/apt/keyrings/{{ item.filename }}.asc"
        mode: '0644'

    - when: item.url is defined
      ansible.builtin.apt_repository:
      filename: "{{ item.filename }}"
      repo: "deb [arch=amd64,signed-by=/etc/apt/keyrings/{{ item.filename }}.asc] {{ item.repo }}"

    - when: item.url is not defined
      ansible.builtin.apt_repository:
      filename: "{{ item.filename }}"
      repo: "deb [arch=amd64] {{ item.repo }}"


    loop:
    - {
        url: https://apt.releases.hashicorp.com/gpg,
        repo: "https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main",
        filename: hashicorp
      }
    - {
        url: https://download.sublimetext.com/sublimehq-pub.gpg,
        repo: "https://download.sublimetext.com/ apt/dev/",
        filename: sublime-text
      }
    - {
        url: https://download.docker.com/linux/ubuntu/gpg,
        repo: "https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable",
        filename: docker  
      }
    - {
        url: https://packages.microsoft.com/keys/microsoft.asc,
        repo: "deb https://packages.microsoft.com/repos/code stable main",
        filename: microsoft
      }
    - {
        repo: "deb http://dl.google.com/linux/chrome/deb/ stable main",
        filename: google-chrome
      }

  - name: "Install shell packages"
    become: true
    tags: [shell]
    ansible.builtin.package:
      name:
      - starship
      - tilix
      - duf
      - exa
      - git
      - sublime-text
      - code
      - terraform
      - nomad
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
      - google-chrome-stable
      state: latest

  - name: Install starship in bashrc 
    tags: [shell]
    ansible.builtin.lineinfile:
      path: ~/.bashrc
      line: eval "$(starship init bash)"
      state: present
      insertafter: EOF