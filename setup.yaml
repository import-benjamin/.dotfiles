#!/bin/ansible-playbook

---

- hosts: localhost
  tasks:
  - name: Add Apt signing keys
    tags: [ubuntu, apt_repository, proprietary]
    become: true
    ansible.builtin.apt_key:
      id: "{{ item.id }}"
      url: "{{ item.url }}"
      state: present
    loop:
    - {id: E8A032E094D8EB4EA189D270DA418C88A3219F7B, url: https://apt.releases.hashicorp.com/gpg}
    - {id: 1EDDE2CDFC025D17F6DA9EC0ADAE6AD28A8F901A, url: https://download.sublimetext.com/sublimehq-pub.gpg}
    - {id: 9DC858229FC7DD38854AE2D88D81803C0EBFCD88, url: https://download.docker.com/linux/ubuntu}
    - {id: BC528686B50D79E339D3721CEB3E94ADBE1229CF, url: https://packages.microsoft.com/keys/microsoft.asc}

  - name: Install apt repositories
    tags: [ubuntu, apt_repository, proprietary]
    become: true
    ansible.builtin.apt_repository:
      repo: "{{ item.repo }}" 
      state: present
      filename: "{{ item.filename }}"
    loop:
    - {repo: "deb http://dl.google.com/linux/chrome/deb/ stable main", filename: google-chrome}
    - {repo: "deb https://download.sublimetext.com/ apt/dev/", filename: sublime-text}
    - {repo: "deb https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main", filename: hashicorp}
    - {repo: "deb https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable", filename: docker}
    - {repo: "deb https://packages.microsoft.com/repos/code stable main", filename: microsoft}

  - name: "Install shell packages"
    become: true
    tags: [shell]
    ansible.builtin.package:
      name:
      - starship
      - tilix
      - duf
      - exa
      - git
      - sublime-text
      - code
      - terraform
      - nomad
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
      - google-chrome-stable
      state: latest

  - name: Install starship in bashrc 
    tags: [shell]
    ansible.builtin.lineinfile:
      path: ~/.bashrc
      line: eval "$(starship init bash)"
      state: present
      insertafter: EOF